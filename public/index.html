<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AtivAI - Gerador de Atividades Escolares</title>

    <link rel="stylesheet" href="./css/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>AtivAI</h1>

        <p>
          Gere atividades escolares personalizadas para alunos do 1º ao 5º ano
          do Ensino Fundamental.
        </p>
      </header>

      <section class="formulario">
        <label for="ano">Ano Escolar</label>

        <select id="ano">
          <option value="1">1º Ano</option>
          <option value="2">2º Ano</option>
          <option value="3">3º Ano</option>
          <option value="4">4º Ano</option>
          <option value="5">5º Ano</option>
        </select>

        <label for="disciplina">Disciplina</label>

        <input type="text" id="disciplina" placeholder="Ex.: Matemática" />

        <label for="conteudo">Conteúdo</label>

        <textarea
          id="conteudo"
          placeholder="Ex.: Multiplicação, Sistema Solar, Substantivos..."
        ></textarea>

        <button id="btnGerar" type="button" onclick="gerarAtividade()">
          Gerar Atividade
        </button>

        <button id="btnPdf" type="button" onclick="baixarPdf()" disabled>
          Baixar PDF
        </button>
      </section>

      <section class="resultado">
        <h2>Atividade Gerada</h2>

        <div id="resposta" class="atividade">
          A atividade aparecerá aqui.
        </div>
      </section>
    </div>
    <script>
      let ultimaAtividade = "";
      let anoSelecionado = "";
      let disciplinaSelecionada = "";

      marked.setOptions({
        breaks: true
      });

      async function gerarAtividade() {
        const ano = document.getElementById("ano").value;
        const disciplina = document.getElementById("disciplina").value;
        const conteudo = document.getElementById("conteudo").value;

        anoSelecionado = ano;
        disciplinaSelecionada = disciplina;

        const resposta = document.getElementById("resposta");

        const botao = document.getElementById("btnGerar");

        if (!disciplina.trim()) {
          resposta.textContent = "Informe a disciplina.";
          return;
        }

        if (disciplina.trim().length < 3) {
          resposta.textContent = "Descreva melhor a disciplina.";
          return;
        }

        if (!conteudo.trim()) {
          resposta.textContent = "Informe o conteúdo.";
          return;
        }

        if (conteudo.trim().length < 3) {
          resposta.textContent = "Descreva melhor o conteúdo da atividade.";
          return;
        }

        resposta.textContent = "Gerando atividade...";

        const prompt = `ANO:${ano};DISCIPLINA:${disciplina.trim()};CONTEUDO:${conteudo.trim()}`;

        botao.disabled = true;
        botao.textContent = "Gerando...";

        try {
          const response = await fetch("/api/llm", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              prompt,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            resposta.textContent = data.erro || "Erro desconhecido.";
            return;
          }

          ultimaAtividade = data.resposta;
          resposta.innerHTML = marked.parse(ultimaAtividade);
          document.getElementById("btnPdf").disabled = false;
        } catch (error) {
          resposta.textContent = "Erro ao conectar com a API local.";
        } finally {
          botao.disabled = false;
          botao.textContent = "Gerar Atividade";
        }
      }

      async function baixarPdf() {
        try {
          const response = await fetch("/api/pdf", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              conteudo: ultimaAtividade
            }),
          });

          const blob = await response.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          const arquivoDisciplina = disciplinaSelecionada.trim().replace(/\s+/g, "-");
          a.download = `AtivAI-${arquivoDisciplina}-${anoSelecionado}ano.pdf`;
          a.href = url;
          a.click();
          window.URL.revokeObjectURL(url);
        } catch (error) {
          alert("Erro ao gerar o PDF.");
        }
      }
    </script>
  </body>
</html>
